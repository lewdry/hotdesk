<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Outer border -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Inner border (double-outline Mac style) -->
  <rect x="44" y="44" width="424" height="424" fill="none" stroke="#000000" stroke-width="4"/>
  <!-- Title bar stripes -->
  <rect x="52" y="52" width="408" height="20" fill="#000000"/>
  <!-- Stripe pattern in title bar -->
  <rect x="52" y="52" width="408" height="4" fill="#ffffff" opacity="0.3"/>
  <rect x="52" y="60" width="408" height="4" fill="#ffffff" opacity="0.3"/>
  <rect x="52" y="68" width="408" height="4" fill="#ffffff" opacity="0.3"/>
  <!-- Close button -->
  <rect x="58" y="56" width="12" height="12" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <!-- "H" for Hotdesk, centred -->
  <text x="256" y="320" font-family="serif" font-size="220" font-weight="bold" text-anchor="middle" fill="#000000">H</text>
</svg>
